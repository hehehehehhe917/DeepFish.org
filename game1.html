<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deep Fish - Abyssal Trench</title>
    <style>
        :root {
            --abyss-navy: #00040a;
            --fish-grey: #2a2d34; 
            --blue-glow: #00d4ff;
            --teeth-color: #f0f0f0;
            --gory-red: #a30000; 
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at 50% 50%, #001219, var(--abyss-navy) 90%);
            color: white; font-family: 'Arial Black', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden; position: relative;
        }

        /* --- CLIFFS --- */
        .cliff {
            position: fixed; top: 0; bottom: 0; width: 20vw;
            background: linear-gradient(90deg, #050505, #15171a);
            z-index: 10; filter: drop-shadow(10px 0 15px #000);
            pointer-events: none;
        }
        .cliff-left { left: 0; clip-path: polygon(0% 0%, 100% 0%, 85% 12%, 98% 25%, 82% 38%, 100% 50%, 78% 65%, 92% 82%, 72% 92%, 100% 100%, 0% 100%); }
        .cliff-right { right: 0; clip-path: polygon(100% 0%, 0% 0%, 15% 12%, 2% 25%, 18% 38%, 0% 50%, 22% 65%, 8% 82%, 28% 92%, 0% 100%, 100% 100%); }

        /* --- UI LAYOUT --- */
        .content-wrapper {
            position: relative; z-index: 15;
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 850px; padding: 50px 0;
        }

        h2 { 
            font-size: 5rem; color: #000b1a; 
            text-shadow: 0 0 15px var(--blue-glow), 0 0 30px rgba(0, 212, 255, 0.4); 
            margin-bottom: 40px; text-align: center; letter-spacing: 5px;
        }

        .game-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 30px; width: 85%;
        }
        
        .game-card { 
            height: 160px; background: rgba(5, 10, 20, 0.9); 
            border: 2px solid #1a3a4a; border-radius: 20px; 
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; transition: 0.3s; font-size: 1.4rem;
        }
        
        .game-card:hover { 
            transform: translateY(-8px); border-color: var(--blue-glow); 
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.3); color: var(--blue-glow);
        }

        /* --- WARNING MODAL --- */
        #warning-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 4, 10, 0.9);
            backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center;
            z-index: 5000;
        }
        
        .modal-content {
            background: rgba(10, 20, 30, 0.95);
            border: 2px solid var(--blue-glow);
            border-radius: 15px; padding: 40px; text-align: center;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }
        
        .modal-title { color: #ff3333; font-size: 2rem; margin-bottom: 20px; }
        .modal-text { color: #e0e0e0; font-size: 1.2rem; margin-bottom: 30px; line-height: 1.5; }
        .modal-buttons { display: flex; justify-content: space-around; gap: 20px; }
        
        .modal-btn {
            background: transparent; border: 2px solid; padding: 15px 30px;
            border-radius: 8px; font-family: 'Arial Black', sans-serif;
            font-size: 1.1rem; cursor: pointer; transition: 0.3s;
        }
        .btn-continue { border-color: #ff3333; color: #ff3333; }
        .btn-continue:hover { background: #ff3333; color: #000; }
        .btn-cancel { border-color: var(--blue-glow); color: var(--blue-glow); }
        .btn-cancel:hover { background: var(--blue-glow); color: #000; }

        /* --- THE GREY ANGLER --- */
        #bite-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; justify-content: center; align-items: center;
            z-index: 10000; background: transparent; pointer-events: none;
        }

        .angler-full-head {
            position: relative; width: 650px; height: 550px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transform: scale(0); opacity: 0;
        }

        .fish-face-plate { position: absolute; width: 520px; height: 420px; background: var(--fish-grey); border-radius: 50%; border: 5px solid #000; z-index: 2; }
        .mouth-throat { position: absolute; width: 600px; height: 380px; background: #000; border-radius: 50%; z-index: 1; overflow: hidden; }
        .eye { position: absolute; top: 125px; width: 38px; height: 38px; background: #111; border-radius: 50%; border: 3px solid #000; z-index: 15; }
        .eye-left { left: 115px; } .eye-right { right: 115px; }

        .lure { position: absolute; top: -110px; left: 50%; transform: translateX(-50%); width: 10px; height: 150px; background: #0a0a0a; z-index: 5; }
        .lure::after { content: ''; position: absolute; bottom: -12px; left: -12px; width: 35px; height: 35px; background: var(--blue-glow); border-radius: 50%; box-shadow: 0 0 40px var(--blue-glow); }

        .jaw { width: 650px; height: 260px; background: var(--fish-grey); position: relative; border: 5px solid #000; display: flex; justify-content: space-around; z-index: 10; }
        .jaw-top { border-radius: 300px 300px 45px 45px; transform-origin: top center; z-index: 11; }
        .jaw-bottom { border-radius: 45px 45px 300px 300px; transform-origin: bottom center; z-index: 10; }
        .tooth { width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; }
        .jaw-top .tooth { border-top: 80px solid var(--teeth-color); align-self: flex-end; margin-bottom: -35px; }
        .jaw-bottom .tooth { border-bottom: 80px solid var(--teeth-color); align-self: flex-start; margin-top: -35px; }

        /* --- ANIMATIONS --- */
        .active-bite { display: flex !important; }
        .active-bite .angler-full-head { animation: approach 0.6s ease-out forwards, lungeForward 0.2s forwards 1.1s; }
        .active-bite .jaw-top { animation: gapeTop 0.4s forwards 0.6s, crunchTop 0.1s forwards 1.1s; }
        .active-bite .jaw-bottom { animation: gapeBottom 0.4s forwards 0.6s, crunchBottom 0.1s forwards 1.1s; }
        .active-bite .mouth-throat { background: var(--gory-red); transition: background 0.4s 0.6s; }
        .active-bite .eye { animation: eyeFlare 0.4s forwards 0.6s; }

        @keyframes approach { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes gapeTop { to { transform: translateY(-110px); } }
        @keyframes gapeBottom { to { transform: translateY(110px); } }
        @keyframes eyeFlare { to { background: var(--blue-glow); box-shadow: 0 0 15px var(--blue-glow); } }
        @keyframes lungeForward { to { transform: scale(10); } } 
        @keyframes crunchTop { from { transform: translateY(-110px); } to { transform: translateY(125px); } }
        @keyframes crunchBottom { from { transform: translateY(110px); } to { transform: translateY(-125px); } }

        .blackout { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: black; z-index: 10001; opacity: 0; pointer-events: none; }
        .active-blackout { opacity: 1; transition: opacity 0.05s 1.2s; }
    </style>
</head>
<body>

    <div class="cliff cliff-left"></div>
    <div class="cliff cliff-right"></div>
    <div id="blackout-curtain" class="blackout"></div>

    <div id="warning-modal">
        <div class="modal-content">
            <div class="modal-title">DANGER AHEAD</div>
            <div class="modal-text">Warning: You are entering a 3rd party Website outside of this domain.<br>Continue?</div>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeWarning()">No thx</button>
                <button class="modal-btn btn-continue" onclick="continueToLink()">STFU</button>
            </div>
        </div>
    </div>

    <div class="content-wrapper">
        <h2>Deep ocean Games</h2>
        <div class="game-grid">
            <div class="game-card" onclick="openWarning()">Public Proxies</div>
            
            <div class="game-card" onclick="triggerBite('game2.html')">Draw Joust</div>
            <div class="game-card" onclick="triggerBite('game3.html')">Spider Dih</div>
            <div class="game-card" onclick="triggerBite('game4.html')">Null</div>
        </div>
        <a href="index.html" style="margin-top: 50px; color: var(--blue-glow); text-decoration: none; opacity: 0.7;">&larr; SURFACE ASCENT</a>
    </div>

    <div id="bite-overlay">
        <div class="angler-full-head">
            <div class="lure"></div>
            <div class="fish-face-plate"></div>
            <div class="mouth-throat"></div> 
            <div class="eye eye-left"></div>
            <div class="eye eye-right"></div>
            <div class="jaw jaw-top">
                <div class="tooth"></div><div class="tooth"></div><div class="tooth"></div><div class="tooth"></div>
            </div>
            <div class="jaw jaw-bottom">
                <div class="tooth" style="margin-left:25px"></div><div class="tooth"></div><div class="tooth"></div><div class="tooth"></div>
            </div>
        </div>
    </div>

    <script>
        // --- CHANGE YOUR LINK HERE ---
        const PROXY_LINK = "https://www.google.com"; 

        function openWarning() {
            document.getElementById('warning-modal').style.display = 'flex';
        }

        function closeWarning() {
            document.getElementById('warning-modal').style.display = 'none';
        }

        function continueToLink() {
            closeWarning();
            // Start the jumpscare, then go to the link
            triggerBite(PROXY_LINK);
        }

        function triggerBite(url) {
            document.getElementById('bite-overlay').classList.add('active-bite');
            document.getElementById('blackout-curtain').classList.add('active-blackout');
            setTimeout(() => { 
                window.location.href = url; 
            }, 1300);
        }

        let lastKeyTime = 0;
        document.addEventListener('keydown', (e) => {
            if (e.key === '8') {
                const currentTime = Date.now();
                if (currentTime - lastKeyTime < 500) window.location.href = "https://creativefish.org/";
                lastKeyTime = currentTime;
            }
        });
    </script>
</body>
</html>
